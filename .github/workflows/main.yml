name: Pinterest Premium Bot

on:
  schedule:
    - cron: "0 */4 * * *" # প্রতি ৪ ঘণ্টা পর অটোমেটিক রিস্টার্ট
  workflow_dispatch: # ম্যানুয়ালি রান করার জন্য

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Premium Bot
        timeout-minutes: 238 # ৪ ঘণ্টা পূর্ণ হওয়ার একটু আগে বন্ধ হবে
        run: python bot.py
