name: Pinterest Bot Runner

on:
  schedule:
    - cron: "0 */4 * * *" # প্রতি ৪ ঘণ্টা পর পর অটোমেটিক চলবে
  workflow_dispatch: # ম্যানুয়ালি রান করার অপশন

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Bot
        timeout-minutes: 235 # ২৩৫ মিনিট (প্রায় ৪ ঘণ্টা) পর প্রসেসটি বন্ধ হবে যাতে নতুন শিডিউল শুরু হতে পারে
        run: python bot.py
